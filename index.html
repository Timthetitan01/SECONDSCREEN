<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNest - Login</title>
    <link rel="icon" type="image/png" href="studynestlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script> tailwind.config = { darkMode: 'class' } </script>

    <style>
        :root {
            --primary: #0088b5; --success: #10b981; --error: #ef4444; --inactive: #cbd5e1;
            --bg: #f8fafc; --card-bg: #ffffff; --label: #64748b; --text-main: #0f172a;
            --font: 'Ubuntu', sans-serif;
            --ios-orange: #f59e0b;
        }
        html.dark {
            --inactive: #475569; --bg: #0f172a; --card-bg: #1e293b; --label: #94a3b8;
            --text-main: #ffffff;
        }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font); height: 100vh; overflow: hidden; transition: 0.5s; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .input-container { position: relative; margin-bottom: 2rem; width: 100%; }
        .custom-input { border: 4px solid var(--inactive); border-radius: 50px; padding: 1.5rem 2rem; width: 100%; outline: none; background: transparent; transition: 0.4s; z-index: 10; position: relative; font-family: var(--font); color: var(--text-main); }
        .custom-label { position: absolute; top: 50%; left: 30px; transform: translateY(-50%); background: var(--bg); padding: 0 10px; color: var(--label); font-weight: bold; transition: 0.4s; pointer-events: none; z-index: 20; }
        .custom-input:focus, .custom-input:not(:placeholder-shown) { border-color: var(--primary); }
        .custom-input:focus + .custom-label, .custom-input:not(:placeholder-shown) + .custom-label { top: 0; transform: translateY(-50%) scale(0.9); border: 4px solid var(--primary); border-radius: 20px; color: var(--primary); }
        .custom-input.valid { border-color: var(--success) !important; }
        .custom-input.valid + .custom-label { border-color: var(--success) !important; color: var(--success) !important; }
        .custom-input.invalid:not(:focus) { border-color: var(--error) !important; }
        .custom-input.invalid:not(:focus) + .custom-label { border-color: var(--error) !important; color: var(--error) !important; }

        .profile-card { border: 4px solid var(--primary); border-radius: 40px; position: relative; min-height: 280px; background: var(--card-bg); transition: 0.5s; }
        .profile-cutout { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 150px; height: 75px; background: var(--bg); border-bottom: 4px solid var(--primary); border-left: 4px solid var(--primary); border-right: 4px solid var(--primary); border-bottom-left-radius: 75px; border-bottom-right-radius: 75px; z-index: 5; transition: 0.5s; }
        .icon-circle { position: absolute; top: -64px; width: 128px; height: 128px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); transition: 0.5s; }
        .icon-layer { position: absolute; font-size: 72px !important; opacity: 0; transform: scale(0.5) rotate(-20deg); transition: 0.5s; pointer-events: none; }
        
        .state-person #icon-person { opacity: 1; transform: scale(1) rotate(0deg); color: var(--primary); }
        .state-key #icon-key { opacity: 1; transform: scale(1) rotate(0deg); color: var(--ios-orange); }
        .state-success #icon-success { opacity: 1; transform: scale(1) rotate(0deg); color: var(--success); }

        .strength-meter { height: 6px; border-radius: 3px; background: var(--inactive); margin-top: 10px; width: 0%; transition: 0.5s; }
        .create-btn { background: var(--inactive); color: white; border: none; border-radius: 50px; padding: 1.2rem 2rem; font-weight: bold; font-size: 1.5rem; cursor: not-allowed; transition: 0.4s; position: relative; overflow: hidden; }
        .create-btn.ready { background: var(--primary); cursor: pointer; box-shadow: 0 10px 20px -5px rgba(0, 136, 181, 0.5); }
        .create-btn.ready:hover { transform: translateY(-5px) scale(1.02); }
        .create-btn.loading { width: 60px; padding: 1.2rem 0; color: transparent; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <button id="themeToggleOverlay" class="absolute top-6 right-6 p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg text-slate-800 dark:text-white transition-all hover:scale-110 z-50 group border border-slate-200 dark:border-slate-700">
            <span class="material-symbols-rounded transition-transform group-hover:rotate-12" id="themeIconOverlay">dark_mode</span>
        </button>

        <div class="max-w-5xl w-full p-8 grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div class="space-y-6 mt-10">
                <h1 class="text-5xl font-extrabold text-center mb-10 tracking-tight" style="color: var(--text-main);">StudyNest</h1>
                
                <div class="input-container">
                    <input type="email" id="emailInput" class="custom-input" placeholder=" ">
                    <label class="custom-label text-xl">Email Address</label>
                </div>

                <div class="input-container">
                    <input type="password" id="passwordInput" class="custom-input" placeholder=" ">
                    <label class="custom-label text-xl">Password</label>
                    <div id="strengthMeter" class="strength-meter"></div>
                </div>
            </div>

            <div class="flex flex-col items-center space-y-8 state-person" id="cardContainer">
                <div class="profile-card w-full p-8 pt-20 shadow-2xl dark:shadow-slate-900/50 flex flex-col items-center">
                    <div class="profile-cutout"></div>
                    <div class="icon-circle">
                        <span class="material-symbols-rounded icon-layer" id="icon-person">person</span>
                        <span class="material-symbols-rounded icon-layer" id="icon-key">key</span>
                        <span class="material-symbols-rounded icon-layer" id="icon-success">check_circle</span>
                    </div>
                    <div class="text-center mt-6 w-full flex flex-col items-center justify-center">
                        <p id="cardName" class="text-3xl font-bold truncate transition-colors duration-500 w-full" style="color: var(--text-main);">User</p>
                        <div class="h-12 flex items-center justify-center w-full mt-2 overflow-hidden">
                            <p id="cardPass" class="tracking-widest transition-all duration-200 ease-out truncate" style="color: var(--label); font-size: 2.25rem;">*******</p>
                        </div>
                    </div>
                </div>

                <div class="w-full flex flex-col gap-4">
                    <button id="submitBtn" class="create-btn w-full flex justify-center items-center">
                        <span>Enter Dashboard</span>
                        <svg id="spinner" class="animate-spin absolute hidden w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                    <button class="w-full py-3 rounded-full border-2 border-[var(--inactive)] text-[var(--text-main)] font-bold hover:border-[var(--primary)] transition-colors flex items-center justify-center gap-2 bg-transparent" onclick="Auth.googleLogin()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                        Sign in with Google
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        // REPLACE THE KEYS BELOW WITH YOUR ACTUAL FIREBASE CONSOLE KEYS
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const LoginUI = {
            init: () => {
                const isDark = localStorage.getItem('theme') !== 'light';
                if(isDark) document.documentElement.classList.add('dark');
                LoginUI.updateIcons();
                document.getElementById('themeToggleOverlay').addEventListener('click', LoginUI.toggleTheme);
                
                const eInput = document.getElementById('emailInput');
                const pInput = document.getElementById('passwordInput');
                const cardName = document.getElementById('cardName');
                const cardPass = document.getElementById('cardPass');
                const strengthMeter = document.getElementById('strengthMeter');
                const submitBtn = document.getElementById('submitBtn');
                
                eInput.addEventListener('focus', LoginUI.updateIconState); pInput.addEventListener('focus', LoginUI.updateIconState);
                eInput.addEventListener('blur', () => setTimeout(LoginUI.updateIconState, 10)); pInput.addEventListener('blur', () => setTimeout(LoginUI.updateIconState, 10));

                eInput.addEventListener('input', (e) => {
                    const val = e.target.value;
                    // Simple display logic: grab text before @
                    cardName.innerText = val ? val.split('@')[0] : "User";
                    
                    // Basic Email Regex for validation
                    const isValidEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

                    if (isValidEmail) { eInput.classList.add('valid'); eInput.classList.remove('invalid'); LoginUI.uValid = true; } 
                    else { eInput.classList.remove('valid'); if(val.length > 0) eInput.classList.add('invalid'); LoginUI.uValid = false; }
                    LoginUI.checkReady();
                });

                pInput.addEventListener('input', (e) => {
                    const val = e.target.value; const len = val.length;
                    cardPass.innerText = len > 0 ? "•".repeat(len) : "*******";
                    cardPass.style.fontSize = len > 10 ? `${Math.max(0.75, 2.25 * (10 / len))}rem` : '2.25rem';
                    let strength = 0;
                    if (len > 0) strength += 25; if (len >= 6) strength += 25;
                    if (/[A-Z]/.test(val)) strength += 25; if (/[0-9]/.test(val)) strength += 25;
                    strengthMeter.style.width = strength + '%';
                    strengthMeter.style.background = strength <= 25 ? 'var(--error)' : (strength <= 50 ? '#eab308' : 'var(--success)');
                    
                    if (len >= 6) { pInput.classList.add('valid'); pInput.classList.remove('invalid'); LoginUI.pValid = true; } 
                    else { pInput.classList.remove('valid'); if(len > 0) pInput.classList.add('invalid'); LoginUI.pValid = false; }
                    LoginUI.checkReady();
                });

                submitBtn.addEventListener('click', () => {
                    if (!LoginUI.uValid || !LoginUI.pValid) return;
                    Auth.emailLogin(eInput.value, pInput.value);
                });
            },
            toggleTheme: () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                LoginUI.updateIcons();
            },
            updateIcons: () => {
                const isDark = document.documentElement.classList.contains('dark');
                document.getElementById('themeIconOverlay').innerText = isDark ? 'light_mode' : 'dark_mode';
            },
            updateIconState: () => {
                const c = document.getElementById('cardContainer');
                c.classList.remove('state-person', 'state-key', 'state-success');
                if (LoginUI.successMode) c.classList.add('state-success');
                else if (document.activeElement === document.getElementById('passwordInput')) c.classList.add('state-key');
                else c.classList.add('state-person');
            },
            checkReady: () => {
                const b = document.getElementById('submitBtn');
                if (LoginUI.uValid && LoginUI.pValid) { b.classList.add('ready'); b.disabled = false; } 
                else { b.classList.remove('ready'); b.disabled = true; }
            },
            showLoading: (isLoading) => {
                const btn = document.getElementById('submitBtn');
                const spinner = document.getElementById('spinner');
                const text = btn.querySelector('span');
                if(isLoading) {
                    btn.classList.add('loading');
                    text.style.display = 'none';
                    spinner.classList.remove('hidden');
                } else {
                    btn.classList.remove('loading');
                    text.style.display = 'block';
                    spinner.classList.add('hidden');
                }
            },
            showSuccess: () => {
                const btn = document.getElementById('submitBtn');
                LoginUI.showLoading(false);
                btn.style.background = 'var(--success)';
                btn.querySelector('span').innerText = 'Success!';
                btn.style.transform = 'scale(1.1)';
                LoginUI.successMode = true; LoginUI.updateIconState();
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            },
            uValid: false, pValid: false, successMode: false
        };

        const Auth = {
            emailLogin: (email, password) => {
                LoginUI.showLoading(true);
                // Try to Sign In
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        // Signed in
                        LoginUI.showSuccess();
                    })
                    .catch((error) => {
                        if (error.code === 'auth/user-not-found') {
                            // User doesn't exist, try to Sign Up (Create Account)
                            Auth.emailSignUp(email, password);
                        } else {
                            LoginUI.showLoading(false);
                            alert("Error: " + error.message);
                        }
                    });
            },
            emailSignUp: (email, password) => {
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        // Signed up
                        LoginUI.showSuccess();
                    })
                    .catch((error) => {
                        LoginUI.showLoading(false);
                        alert("Creation Error: " + error.message);
                    });
            },
            googleLogin: () => {
                auth.signInWithPopup(provider)
                    .then((result) => {
                        // Google Sign-in successful
                        LoginUI.showSuccess();
                    }).catch((error) => {
                        alert("Google Error: " + error.message);
                    });
            }
        };

        window.onload = LoginUI.init;
    </script>
</body>
</html>
