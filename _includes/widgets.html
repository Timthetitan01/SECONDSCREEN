<script>
    let activePandoras = {};
    let player = null;

    const GlobalMedia = {
        activeSource: 'None',
        send: (action) => {
            if (GlobalMedia.activeSource === 'Spotify' && player) {
                if (action === 'playpause') Spotify.toggle();
                if (action === 'next') Spotify.next();
                if (action === 'prev') Spotify.prev();
                return;
            }
            if ('mediaSession' in navigator) {
                try {
                    const keyMap = { 'playpause': 179, 'next': 176, 'prev': 177 };
                    if(keyMap[action]) document.dispatchEvent(new KeyboardEvent('keydown', {'keyCode': keyMap[action]}));
                    UI.showToast("Command Sent");
                } catch(e) { console.log(e); }
            }
        },
        updateDisplay: (title, artist) => {
            const text = title ? `${title} - ${artist}` : "No Active Media";
            document.querySelectorAll('.media-info-text').forEach(el => el.innerText = text);
        }
    };
    
    const SPOTIFY_CLIENT_ID = "2aea224b957a49e0ade20938094a2170"; 
    const SPOTIFY_SCOPES = "streaming user-read-email user-read-private user-modify-playback-state user-read-currently-playing user-read-playback-state";

    const Spotify = {
        token: null,
        deviceId: null,
        login: () => {
            const generateRandomString = (l) => {
                const p = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                return crypto.getRandomValues(new Uint8Array(l)).reduce((a, x) => a + p[x % p.length], "");
            };
            const sha256 = async (p) => window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
            const base64encode = (i) => btoa(String.fromCharCode.apply(null, new Uint8Array(i))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            const start = async () => {
                const v = generateRandomString(64);
                localStorage.setItem('spotify_verifier', v);
                const hash = await sha256(v);
                const challenge = base64encode(hash);
                const url = new URL("https://accounts.spotify.com/authorize");
                url.search = new URLSearchParams({
                    response_type: 'code', client_id: SPOTIFY_CLIENT_ID, scope: SPOTIFY_SCOPES,
                    code_challenge_method: 'S256', code_challenge: challenge,
                    redirect_uri: window.location.origin + window.location.pathname
                }).toString();
                window.open(url, 'Spotify', 'width=500,height=800');
            };
            start();
        },
        handleCode: async (code) => {
            const v = localStorage.getItem('spotify_verifier');
            const res = await fetch("https://accounts.spotify.com/api/token", {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: SPOTIFY_CLIENT_ID, grant_type: 'authorization_code',
                    code, redirect_uri: window.location.origin + window.location.pathname, code_verifier: v
                })
            });
            const d = await res.json();
            if(d.access_token) {
                Spotify.token = d.access_token;

        initPlayer: () => {
            const t = localStorage.getItem('sp_token');
            if(!t) return;
            Spotify.token = t;
            if(player) return;
            
            // Redefine callback for when script loads later
            window.onSpotifyWebPlaybackSDKReady = () => {
                player = new Spotify.Player({ name: 'StudyNest Web Player', getOAuthToken: cb => { cb(Spotify.token); }, volume: 0.5 });
                player.addListener('ready', ({ device_id }) => {
                    Spotify.deviceId = device_id;

                        el.classList.add('active');

                    const track = state.track_window.current_track;
                    GlobalMedia.activeSource = 'Spotify';
                    GlobalMedia.updateDisplay(track.name, track.artists[0].name);
                });
                player.addListener('authentication_error', () => {
                        UI.showToast("Auth Error. Re-login");

            });

        'Weight': { 'kg': 1, 'g': 0.001, 'mg': 0.000001, 'lb': 0.453592, 'oz': 0.0283495 },
        'Temp': { 'C': 'c', 'F': 'f', 'K': 'k' },
        'Volume': { 'L': 1, 'ml': 0.001, 'gal': 3.78541, 'qt': 0.946353, 'pt': 0.473176, 'cup': 0.24, 'fl oz': 0.0295735, 'tbsp': 0.015, 'tsp': 0.005 },
        'Time': { 's': 1, 'min': 60, 'hr': 3600, 'day': 86400, 'wk': 604800, 'yr': 31536000 },
        'Digital': { 'B': 1, 'KB': 1024, 'MB': 1048576, 'GB': 1073741824, 'TB': 1099511627776 },

            fromSel.innerHTML = ''; toSel.innerHTML = '';
            
            Object.keys(CONVERSION_RATES[cat]).forEach(u => {

        runConversion: (id) => {
            const cat = document.getElementById(`conv-cat-${id}`).value;
            const val = parseFloat(document.getElementById(`conv-in-${id}`).value);
            const from = document.getElementById(`conv-from-${id}`).value;
            const to = document.getElementById(`conv-to-${id}`).value;
            const resEl = document.getElementById(`conv-res-${id}`);

            if (isNaN(val)) { resEl.innerText = '---'; return; }

            let result;
            if (cat === 'Temp') {
                let cVal = val;
                if (from === 'F') cVal = (val - 32) * 5/9;
                if (from === 'K') cVal = val - 273.15;
                
                if (to === 'C') result = cVal;
                if (to === 'F') result = (cVal * 9/5) + 32;
                if (to === 'K') result = cVal + 273.15;
            } else {
                const baseVal = val * CONVERSION_RATES[cat][from];
                result = baseVal / CONVERSION_RATES[cat][to];
            }
            
            resEl.innerText = Math.abs(result) < 0.001 || Math.abs(result) > 10000 ? result.toExponential(3) : parseFloat(result.toFixed(4));

        calc: (id, val) => {
            const s = document.getElementById(`scr-${id}`);
            const h = document.getElementById(`hist-${id}`);
            let expr = s.getAttribute('data-expr') || ''; 
            let isRes = s.getAttribute('data-res') === 'true';

            const update = (txt, raw) => { s.innerText = txt; s.setAttribute('data-expr', raw); s.setAttribute('data-res', 'false'); };

            if (val === 'AC') { s.innerText = '0'; h.innerText = ''; s.setAttribute('data-expr', ''); s.setAttribute('data-res', 'false'); return; }
            if (val === 'DEL') {
                if (isRes) { update('0', ''); return; }
                let vTxt = s.innerText.toString();
                let vExpr = expr.toString();
                if (vTxt.length <= 1 || vTxt === 'Error') { update('0', ''); }
                else { update(vTxt.slice(0, -1), vExpr.slice(0, -1)); }
                return;
            }
            if (val === '=') {
                try {
                    h.innerText = s.innerText + ' =';
                    let evalStr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**').replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E').replace(/√/g, 'Math.sqrt').replace(/log/g, 'Math.log10').replace(/ln/g, 'Math.log').replace(/sin/g, 'Math.sin').replace(/cos/g, 'Math.cos').replace(/tan/g, 'Math.tan');
                    let res = eval(evalStr);
                    res = Math.round(res * 10000000000) / 10000000000;
                    s.innerText = res; s.setAttribute('data-expr', res.toString()); s.setAttribute('data-res', 'true');
                } catch (e) { s.innerText = "Error"; setTimeout(() => update('0', ''), 1000); }
                return;
            }
            if (isRes) {
                if (['+', '-', '×', '÷', '^', '%'].includes(val)) { s.setAttribute('data-res', 'false'); } else { expr = ''; s.innerText = ''; isRes = false; s.setAttribute('data-res', 'false'); }
            }
            if (s.innerText === '0' && !['.', '+', '-', '×', '÷', '^', ')', '%'].includes(val)) { s.innerText = ''; expr = ''; }
            let displayVal = val; let mathVal = val;
            if(val === 'sin') { displayVal='sin('; mathVal='sin('; } else if(val === 'cos') { displayVal='cos('; mathVal='cos('; } else if(val === 'tan') { displayVal='tan('; mathVal='tan('; } else if(val === 'log') { displayVal='log('; mathVal='log('; } else if(val === 'ln') { displayVal='ln('; mathVal='ln('; } else if(val === '√') { displayVal='√('; mathVal='√('; }
            s.innerText += displayVal; s.setAttribute('data-expr', expr + mathVal);
        },

        initCanvas: (id, savedUrl) => {
            const cvs = document.getElementById(`canv-${id}`);
            const ctx = cvs.getContext('2d', { willReadFrequently: true });
            let currentPenColor = cvs.dataset.currentColor || '#000000';
            let currentLineWidth = parseInt(cvs.dataset.currentWidth) || 3;
            let currentTool = cvs.dataset.currentTool || 'pen';

            const resizeCanvas = () => {
                const temp = ctx.getImageData(0,0, cvs.width, cvs.height);
                cvs.width = cvs.clientWidth;
                cvs.height = cvs.clientHeight;
                ctx.putImageData(temp, 0, 0);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                // Re-apply correct state for tool
                if (cvs.dataset.currentTool === 'eraser') {
                     ctx.strokeStyle = '#ffffff';
                     ctx.lineWidth = 20;
                } else {
                     ctx.strokeStyle = cvs.dataset.currentColor || '#000000';
                     ctx.lineWidth = parseInt(cvs.dataset.currentWidth) || 3;
                }
            };

            const rect = cvs.getBoundingClientRect();
            cvs.width = rect.width; cvs.height = rect.height;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round'; 
            ctx.lineWidth = currentLineWidth; ctx.strokeStyle = currentPenColor;

            if (savedUrl) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = savedUrl; }
            new ResizeObserver(() => requestAnimationFrame(resizeCanvas)).observe(cvs);

            let isDrawing = false, lastX = 0, lastY = 0;
            
            const getPos = (e) => { 
                const r = cvs.getBoundingClientRect(); 
                if(e.touches) { return { x: Math.floor(e.touches[0].clientX - r.left), y: Math.floor(e.touches[0].clientY - r.top) }; } 
                return { x: Math.floor(e.clientX - r.left), y: Math.floor(e.clientY - r.top) }; 
            };

            const start = (e) => { 
                const pos = getPos(e); 
                if (cvs.dataset.currentTool === 'bucket') {
                    // Bucket Logic
                    const hex = cvs.dataset.currentColor || '#000000';
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    Utils.floodFill(ctx, pos.x, pos.y, [r, g, b, 255]);
                } else {
                    // Pen Logic
                    isDrawing = true; 
                    lastX = pos.x; lastY = pos.y; 
                }
                e.preventDefault(); 
            };

            const move = (e) => { 
                if (!isDrawing) return; 
                const pos = getPos(e); 
                ctx.beginPath(); 
                ctx.moveTo(lastX, lastY); 
                ctx.lineTo(pos.x, pos.y); 
                ctx.stroke(); 
                lastX = pos.x; lastY = pos.y; 
                e.preventDefault(); 
            };

            const stop = () => { if(isDrawing) { isDrawing = false; Core.saveLayout(); } };

            cvs.addEventListener('mousedown', start); cvs.addEventListener('mousemove', move); cvs.addEventListener('mouseup', stop); cvs.addEventListener('mouseout', stop);
            cvs.addEventListener('touchstart', start); cvs.addEventListener('touchmove', move); cvs.addEventListener('touchend', stop);
            
            // Defaults
            if(!cvs.dataset.currentTool) {
                cvs.dataset.currentColor = '#000000';
                cvs.dataset.currentWidth = '3';
                cvs.dataset.currentTool = 'pen';
            }
        },

        floodFill: (ctx, startX, startY, fillColor) => {
            const canvas = ctx.canvas;
            const w = canvas.width;
            const h = canvas.height;
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;

            const getPixelIndex = (x, y) => (y * w + x) * 4;
            
            const startIdx = getPixelIndex(startX, startY);
            const startColor = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];

            if (startColor[0] === fillColor[0] && startColor[1] === fillColor[1] && startColor[2] === fillColor[2]) return;

            const matchStartColor = (idx) => {
                return data[idx] === startColor[0] &&
                       data[idx+1] === startColor[1] &&
                       data[idx+2] === startColor[2] &&
                       data[idx+3] === startColor[3];
            };

            const colorPixel = (idx) => {
                data[idx] = fillColor[0];
                data[idx+1] = fillColor[1];
                data[idx+2] = fillColor[2];
                data[idx+3] = fillColor[3];
            };

            const stack = [[startX, startY]];

            while (stack.length) {
                const [x, y] = stack.pop();
                const idx = getPixelIndex(x, y);

                if (matchStartColor(idx)) {
                    colorPixel(idx);
                    if (x > 0) stack.push([x - 1, y]);
                    if (x < w - 1) stack.push([x + 1, y]);
                    if (y > 0) stack.push([x, y - 1]);
                    if (y < h - 1) stack.push([x, y + 1]);
                }
            }
            ctx.putImageData(imageData, 0, 0);
            Core.saveLayout();
        },

        setPen: (id, color) => { 
            const cvs = document.getElementById(`canv-${id}`);
            const ctx = cvs.getContext('2d'); 
            
            // If user clicks a color, switch to Pen mode automatically
            Utils.setTool(id, 'pen');

            ctx.strokeStyle = color; 
            ctx.lineWidth = 3;
            
            cvs.dataset.currentColor = color;
            cvs.dataset.currentWidth = 3;
        },

        setTool: (id, tool) => {
            const cvs = document.getElementById(`canv-${id}`);
            const ctx = cvs.getContext('2d');
            cvs.dataset.currentTool = tool;
            
            // Handle context changes based on tool
            if (tool === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 20;
            } else if (tool === 'pen') {
                ctx.strokeStyle = cvs.dataset.currentColor || '#000000';
                ctx.lineWidth = 3;
            }
            
            // Visual update for buttons
            const parent = cvs.parentElement;
            parent.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            const btn = parent.querySelector(`.tool-btn[onclick*="'${tool}'"]`);
            if(btn) btn.classList.add('active');
        },

        clearCanvas: (id) => { 
            const cvs = document.getElementById(`canv-${id}`); 
            const ctx = cvs.getContext('2d'); 
            ctx.clearRect(0, 0, cvs.width, cvs.height); 
            Core.saveLayout(); 
        },

        setPandora: (id) => {
            if(activePandoras[id]) return; 
            UI.askInput("Open Pandora's Box", [{label: "Minutes", value: "1", type: "number", placeholder: "1"}], (values) => {
                const mins = parseInt(values[0]);
                if(!mins || mins <= 0) return;
                Utils.startPandora(id, mins * 60);
            });
        },
        startPandora: (id, totalSeconds) => {
            const container = document.getElementById(`pan-${id}`);
            const display = document.getElementById(`pan-time-${id}`);
            const state = document.getElementById(`pan-state-${id}`);
            let remaining = totalSeconds;
            
            container.classList.remove('pan-finished');
            display.innerText = "00:00";
            display.style.color = "#FFFFFF";
            
            if(activePandoras[id]) clearInterval(activePandoras[id]);
            
            activePandoras[id] = setInterval(() => {
                remaining--;
                const m = Math.floor(remaining / 60).toString().padStart(2,'0');
                const s = (remaining % 60).toString().padStart(2,'0');
                display.innerText = `${m}:${s}`;
                
                const pct = remaining / totalSeconds;
                
                if(pct < 0.1 && pct > 0) { 
                    display.style.color = "#FF453A"; 
                }

                if(remaining <= 0) {
                    clearInterval(activePandoras[id]);
                    delete activePandoras[id];
                    display.classList.add('pan-finished');
                    display.innerText = "DONE";
                    state.innerText = "Time's up!";
                }
            }, 1000);
        }
    };
